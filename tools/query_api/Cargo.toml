[package]
name = "query-api"
version = "0.1.0"
authors = ["Markus Stange <mstange@themasta.com>"]
license = "MIT OR Apache-2.0"
edition = "2021"
publish = false

[dependencies]
wholesym = { path = "../../wholesym", features = ["api"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
tokio = { version = "1.52", features = ["macros", "rt", "rt-multi-thread"] }
serde_json = "1"
